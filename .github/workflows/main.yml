name: README build

on:
  push:
    branches:
      - master
#  schedule:
#    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate README file
        run: node index.js

      - name: Commit and Push new README.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update README.md via automated build"
          file_pattern: 'README.md'
